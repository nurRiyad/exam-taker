packages:
  - "apps/*"

# create-next-app scaffolds apps/web with a duplicate of this line to skip
# pnpm's build-script approval prompt for these native-binary deps; merged
# here since a workspace can only have one pnpm-workspace.yaml.
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

# better-sqlite3's native binary is required for `drizzle-kit studio`
# (apps/api's `db:studio`) to open the local D1 sqlite file directly.
onlyBuiltDependencies:
  - better-sqlite3
